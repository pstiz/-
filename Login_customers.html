<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Food Ordering</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body class="bg-base-100 min-h-screen flex flex-col">

    <!-- NAVBAR -->
    <div class="navbar bg-base-100 border-b border-base-200 px-4 md:px-10">
      <div class="flex-1 flex items-center gap-2">
        <span class="text-xl">✦</span>
        <span class="font-bold text-base md:text-lg">Food ordering system</span>
      </div>
      <div class="flex-none">
        <button class="btn btn-outline btn-sm rounded-xl text-sm"
                onclick="window.location.href='/public/index.html'">
          back to Home
        </button>
      </div>
    </div>

    <!-- FORM -->
    <div class="flex flex-1 items-center justify-center px-4 py-12">
      <div class="w-full max-w-md">
        <h1 class="text-3xl font-bold mb-8 text-center">Welcome</h1>

        <!-- username -->
        <div class="mb-5">
          <label class="block text-sm font-medium mb-1">Username</label>
          <input id="username" type="text" placeholder="Enter your name"
                 class="input input-bordered w-full rounded-lg text-sm" />
        </div>

        <!-- table_number -->
        <div class="mb-6">
          <label class="block text-sm font-medium mb-1">Table</label>
          <select id="tableSelect" class="select select-bordered w-full rounded-lg text-sm">
            <option value="" disabled selected>Select your table</option>
            <option value="1">Table 1</option>
            <option value="2">Table 2</option>
            <option value="3">Table 3</option>
            <option value="4">Table 4</option>
            <option value="5">Table 5</option>
            <option value="6">Table 6</option>
            <option value="7">Table 7</option>
            <option value="8">Table 8</option>
            <option value="9">Table 9</option>
            <option value="10">Table 10</option>
          </select>
        </div>

        <button id="submitBtn" onclick="doLogin()"
                class="btn w-full rounded-lg text-white font-semibold text-base"
                style="background-color:#1AC8DB; border:none;">
          Login
        </button>
      </div>
    </div>

    <script>
      const API_BASE = 'http://localhost:3000';

      async function doLogin() {
        const username     = document.getElementById('username').value.trim();
        const table_number = parseInt(document.getElementById('tableSelect').value);

        if (!username || !table_number) {
          Swal.fire({ icon:'warning', title:'Incomplete',
            text:'Please enter your name and select a table.',
            confirmButtonColor:'#1AC8DB', confirmButtonText:'OK' }); return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading loading-spinner loading-sm"></span>';

        try {
          // POST /customers/login  →  body: { username, table_number }
          const res = await fetch(`${API_BASE}/customers/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, table_number })
          });
          const text = await res.text();

          if (res.ok) {
            sessionStorage.setItem('username', username);
            sessionStorage.setItem('table', table_number);

            await Swal.fire({ icon:'success', title:`Welcome, ${username}!`,
              html:`You're at <b>Table ${table_number}</b>`,
              confirmButtonColor:'#1AC8DB', confirmButtonText:'Order Now',
              timer:2000, timerProgressBar:true });

            window.location.href = text.trim() || 'Menu_customers.html';

          } else if (res.status === 400) {
            Swal.fire({ icon:'warning', title:'Bad Request', text: text,
              confirmButtonColor:'#1AC8DB', confirmButtonText:'OK' });

          } else {
            Swal.fire({ icon:'error', title:'Server Error',
              text:'Something went wrong. Please try again.',
              confirmButtonColor:'#1AC8DB', confirmButtonText:'OK' });
          }

        } catch {
          Swal.fire({ icon:'error', title:'Connection Error', text:'Cannot connect to server.',
            confirmButtonColor:'#1AC8DB', confirmButtonText:'OK' });
        } finally {
          btn.disabled = false;
          btn.innerHTML = 'Login';
        }
      }

      document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    </script>
  </body>
</html>
